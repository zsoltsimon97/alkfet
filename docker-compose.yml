services:
  mariadb:
    image: mariadb:12
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: alkfet
      MYSQL_DATABASE: alkfet
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  backend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npm run start:dev"
    environment:
      DATABASE_URL: mysql://root:alkfet@mariadb:3306/alkfet
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/backend:/app
    depends_on:
      - mariadb

volumes:
  mariadb_data:
