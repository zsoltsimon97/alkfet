services:
  mariadb:
    image: mariadb:12
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: alkfet
      MYSQL_DATABASE: alkfet
    volumes:
      - mariadb_data:/var/lib/mysql

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: mysql://root:alkfet@mariadb:3306/alkfet
      PORT: 3000
    depends_on:
      - mariadb

  apigateway:
    build:
      context: ./apps/apigateway
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:3000
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      - backend

  mcpserver:
    build:
      context: ./apps/mcpserver
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:3000
      PORT: 4100
    ports:
      - "4100:4100"
    depends_on:
      - backend

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE=http://localhost:4000
    ports:
      - "8080:80"
    depends_on:
      - apigateway

volumes:
  mariadb_data:
