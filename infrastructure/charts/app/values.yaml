# Global configuration shared across all services
global:
  environment: production

# Database service configuration
mariadb:
  enabled: true
  auth:
    rootPassword: alkfet
    database: alkfet
    username: alkfet
    password: alkfet
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      limits:
        memory: 512Mi
        cpu: 500m
      requests:
        memory: 256Mi
        cpu: 250m

# Backend service configuration
backend:
  enabled: true
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

# API Gateway service configuration
apigateway:
  enabled: true
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
    targetPort: 4000
  resources:
    limits:
      cpu: 300m
      memory: 256Mi
    requests:
      cpu: 150m
      memory: 128Mi

# MCP Server service configuration
mcpserver:
  enabled: true
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
    targetPort: 4100
  resources:
    limits:
      cpu: 300m
      memory: 256Mi
    requests:
      cpu: 150m
      memory: 128Mi

# Frontend service configuration
frontend:
  enabled: true
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 64Mi
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: app.example.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
